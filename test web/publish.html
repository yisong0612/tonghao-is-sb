<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布闲置 - 校园二手集市</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 头部导航（复用） -->
    <header>
        <div class="container nav-wrap">
            <a href="index.html" class="logo">Campus<span>Second-hand</span>Market</a>
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="all goods.html">All goods</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="publish.html" class="publish-btn"  style="color: #409eff; border-bottom: 2px solid #409eff;">Release the idle state</a></li>
                <li class="avatar-box">
                    <img src="./img/默认用户头像.png" alt="用户头像" class="avatar-img">
                </li>
            </ul>
        </div>
    </header>

    <!-- 发布闲置页面主体 -->
    <div class="page-container">
        <h2 class="page-title">发布闲置商品</h2>
        
        <form class="publish-form">
            <div class="form-group">
                <label for="goods-title">商品标题</label>
                <input type="text" id="goods-title" placeholder="请输入商品标题（如：全新高数教材 送习题册）">
            </div>

            <div class="form-group">
                <label for="goods-category">商品分类</label>
                <select id="goods-category">
                    <option value="">请选择分类</option>
                    <option value="book">教材教辅</option>
                    <option value="digital">数码产品</option>
                    <option value="life">生活用品</option>
                    <option value="clothes">服饰鞋包</option>
                    <option value="sports">文体用品</option>
                    <option value="transport">代步工具</option>
                    <option value="other">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="goods-price">商品价格（元）</label>
                <input type="number" id="goods-price" placeholder="请输入商品价格，0表示免费送">
            </div>

            <div class="form-group">
                <label for="goods-desc">商品描述</label>
                <textarea id="goods-desc" placeholder="请详细描述商品情况：新旧程度、使用时长、是否有破损、交易方式等"></textarea>
            </div>

            <div class="form-group">
                <label>商品图片（必填，最多5张）</label>
                <div class="upload-area">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击或拖拽图片到此处上传</p>
                    <p style="font-size: 12px;">支持JPG/PNG格式，单张不超过5MB</p>
                </div>
            </div>

            <div class="form-group">
                <label for="contact-way">联系方式</label>
                <input type="text" id="contact-way" placeholder="请输入微信/QQ/手机号（方便买家联系）">
            </div>

            <button type="button" class="submit-btn">发布商品</button>
        </form>
    </div>

    <!-- 底部（复用） -->
    <footer>
        <div class="footer-text">
            <p>校园二手集市 © 2025 本平台仅面向本校学生，杜绝校外商家</p>
            <p>交易须知：线下当面交易，验货付款，谨防诈骗</p>
        </div>
    </footer>
</body>
</html>
