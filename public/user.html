<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile - Campus Second-hand Market</title>
<link rel="stylesheet" href="styles.css">
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    background: linear-gradient(180deg, #f5f7fa 0%, #eef3f8 100%);
    color: #333;
}


header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 72px;
    background-color: rgba(255,255,255,0.96);
    backdrop-filter: blur(8px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    z-index: 999;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    height: 100%;
    padding: 0 24px;
}

.nav-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    text-decoration: none;
    font-size: 30px;
    font-weight: 700;
    color: #409eff;
    letter-spacing: 0.3px;
}

.logo span {
    color: #67c23a;
}

.nav-list {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 22px;
    margin: 0;
    padding: 0;
}

.nav-list a {
    text-decoration: none;
    color: #333;
    font-size: 16px;
    padding-bottom: 4px;
}

.nav-list a:hover {
    color: #409eff;
}

.publish-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background-color: #67c23a;
    color: #fff !important;
    padding: 10px 26px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 600;
    line-height: 1;
    border-bottom: none !important;
}

.publish-btn:hover {
    background-color: #5eba2f;
    border-bottom: none !important;
}

.avatar-box {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #e6e6e6;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.avatar-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    background: #fff;
}

.avatar-img:hover {
    border-color: #409eff;
}


.user-container {
    max-width: 1100px;
    width: calc(100% - 40px);
    margin: 120px auto 60px;
    padding: 40px 44px 34px;
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    box-shadow: 0 10px 32px rgba(0,0,0,0.08);
}

.user-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px 28px;
}

.info-value {
    min-height: 56px;
    padding: 16px 18px;
    background: #f7f9fc;
    border: 1px solid #edf1f5;
    border-radius: 12px;
    font-size: 16px;
    display: flex;
    align-items: center;
}
.tip-box {
    display: none;
    max-width: 420px;
    margin: 0 auto 22px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
}

.tip-box.error {
    display: block;
    background: #fff2f0;
    border: 1px solid #ffccc7;
    color: #cf1322;
}

.tip-box.success {
    display: block;
    background: #f6ffed;
    border: 1px solid #b7eb8f;
    color: #389e0d;
}

.user-avatar {
    width: 132px;
    height: 132px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 28px;
    border: 4px solid #409eff;
    box-shadow: 0 8px 20px rgba(64,158,255,0.18);
    background: #fff;
}

.user-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.user-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 22px;
}

.info-item {
    display: flex;
    flex-direction: column;
}

.info-item.full {
    grid-column: 1 / -1;
}

.info-item label {
    display: block;
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
    font-size: 15px;
}

.info-value {
    min-height: 52px;
    padding: 14px 16px;
    background: #f7f9fc;
    border: 1px solid #edf1f5;
    border-radius: 12px;
    word-break: break-word;
    font-size: 16px;
    display: flex;
    align-items: center;
}

.password-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
}

.password-row .info-value {
    flex: 1;
}

.icon-btn {
    min-width: 52px;
    height: 52px;
    border: none;
    border-radius: 12px;
    background: #409eff;
    color: #fff;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s ease;
}

.icon-btn:hover {
    background: #2f89e7;
    transform: translateY(-1px);
}

.logout-wrap {
    grid-column: 1 / -1;
    margin-top: 8px;
}

.logout-btn {
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 14px;
    background: #f56c6c;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.logout-btn:hover {
    background: #e45656;
    transform: translateY(-1px);
}

@media (max-width: 768px) {
    .user-container {
        margin: 104px 16px 30px;
        padding: 24px 18px;
        border-radius: 18px;
    }

    .user-info {
        grid-template-columns: 1fr;
        gap: 16px;
    }

    .info-item.full,
    .logout-wrap {
        grid-column: auto;
    }

    .logo {
        font-size: 24px;
    }

    .nav-list {
        gap: 14px;
    }

    .publish-btn {
        padding: 9px 18px;
    }
}
</style>
</head>

<body>

    <header>
        <div class="container nav-wrap">
            <a href="home.html" class="logo">Campus<span>Second-hand</span>Market</a>
            <ul class="nav-list">
                <li><a href="home.html">Home</a></li>
                <li><a href="all goods.html">All goods</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="publish.html" class="publish-btn">Sell Items</a></li>
                <li class="avatar-box">
                    <img src="./img/Default user avatar.png" alt="Default user avatar" class="avatar-img" id="navAvatar">
                </li>
            </ul>
        </div>
    </header>

    <div class="user-container">
        <div id="tipBox" class="tip-box"></div>

        <div class="user-avatar">
            <img id="userAvatar" src="./img/Default user avatar.png" alt="User Avatar">
        </div>

        <div class="user-info">
    <div class="info-item">
        <label>ID:</label>
        <div class="info-value" id="USER_ID">Loading...</div>
    </div>

    <div class="info-item">
        <label>Password:</label>
        <div class="password-row">
            <div class="info-value" id="USER_PASSWORD">******</div>
            <button id="togglePassword" class="icon-btn" type="button">👁️</button>
        </div>
    </div>

    <div class="info-item">
        <label>Name:</label>
        <div class="info-value" id="USER_NAME">Loading...</div>
    </div>

    <div class="info-item">
        <label>Gender:</label>
        <div class="info-value" id="USER_GENDER">Loading...</div>
    </div>

    <div class="info-item">
        <label>Birthday:</label>
        <div class="info-value" id="USER_BIRTHDAY">Loading...</div>
    </div>

    <div class="info-item">
        <label>Phone:</label>
        <div class="info-value" id="USER_PHONE">Loading...</div>
    </div>

    <div class="info-item full">
        <label>Email:</label>
        <div class="info-value" id="USER_EMAIL">Loading...</div>
    </div>

    <div class="logout-wrap">
        <button id="logoutBtn" class="logout-btn" type="button">Log out</button>
    </div>
</div>

<script>
const API_BASE = 'http://localhost:3000';
let realPassword = '';
let passwordVisible = false;
let tipTimer;

        function showTip(message, type = 'error') {
            const tipBox = document.getElementById('tipBox');

            clearTimeout(tipTimer);

            tipBox.textContent = message;
            tipBox.className = `tip-box ${type}`;

            tipTimer = setTimeout(() => {
                tipBox.className = 'tip-box';
                tipBox.textContent = '';
            }, 2000);
        }

function formatBirthday(dateStr) {
    if (!dateStr) return 'Not set';
    const str = String(dateStr).trim();

    if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
        const [yyyy, mm, dd] = str.split('-');
        return `${yyyy.slice(2)}/${mm}/${dd}`;
    }

    if (/^\d{4}\/\d{2}\/\d{2}$/.test(str)) {
        const [yyyy, mm, dd] = str.split('/');
        return `${yyyy.slice(2)}/${mm}/${dd}`;
    }

    const date = new Date(str);
    if (!Number.isNaN(date.getTime())) {
        const yy = String(date.getFullYear()).slice(2);
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${yy}/${mm}/${dd}`;
    }

    return str;
}


function requireLogin() {
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) {
        alert('Please login first to access the platform!');
        window.location.href = 'index.html';
        return null;
    }
    return currentUser;
}

function fillUserInfo(user) {
    document.getElementById('USER_ID').textContent = user.user_id || 'Not set';
    realPassword = user.user_password || '';
    document.getElementById('USER_PASSWORD').textContent = '******';
    document.getElementById('USER_NAME').textContent = user.user_name || 'Not set';
    document.getElementById('USER_GENDER').textContent = user.gender || 'Not set';
    document.getElementById('USER_BIRTHDAY').textContent = formatBirthday(user.date_of_birth);
    document.getElementById('USER_PHONE').textContent = user.mobile_number || 'Not set';
    document.getElementById('USER_EMAIL').textContent = user.email || 'Not set';
    document.getElementById('navAvatar').src = './img/Default user avatar.png';
    document.getElementById('userAvatar').src = './img/Default user avatar.png';
}

async function loadCurrentUser() {
    const currentUserId = requireLogin();
    if (!currentUserId) return;

    try {
        const response = await fetch(`${API_BASE}/api/users`);
        const result = await response.json();

        if (!result.success || !Array.isArray(result.data)) {
            showTip('Failed to read user information from database.');
            return;
        }

        const user = result.data.find(u =>
            String(u.user_id).toLowerCase() === String(currentUserId).toLowerCase()
        );

        if (!user) {
            showTip('Current user was not found in database.');
            return;
        }

        fillUserInfo(user);
        showTip('User information loaded successfully.', 'success');
    } catch (error) {
        console.error('Load user info error:', error);
        showTip('Network error. Please check whether server.js is running.');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const currentUserId = requireLogin();
    if (!currentUserId) return;

    document.getElementById('navAvatar').addEventListener('click', () => {
        window.location.href = 'user.html';
    });

    document.getElementById('togglePassword').addEventListener('click', () => {
        passwordVisible = !passwordVisible;
        document.getElementById('USER_PASSWORD').textContent = passwordVisible ? realPassword : '******';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('currentUser');
        alert('Logged out successfully!');
        window.location.href = 'index.html';
    });

    loadCurrentUser();
});

document.addEventListener('click', function (e) {
    const isLoggedIn = localStorage.getItem('currentUser');
    if (!isLoggedIn) {
        const target = e.target.closest('a, button, .open-chat');
        if (target) {
            e.preventDefault();
            alert('Please login first!');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 300);
        }
    }
});
</script>

</body>
</html>
