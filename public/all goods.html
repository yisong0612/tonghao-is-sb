<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Second-hand Community - All Goods</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tip-box {
                    display: none;
                    position: fixed;
                    top: 82px;
                    left: 50%;
                    transform: translateX(-50%);
                    z-index: 1200;
                    max-width: 420px;
                    padding: 12px 16px;
                    border-radius: 8px;
                    font-size: 14px;
                }
        .tip-box.error { display: block; background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; }
        .tip-box.success { display: block; background: #f6ffed; border: 1px solid #b7eb8f; color: #389e0d; }
        .category-card.active { border: 2px solid #409eff; color: #409eff; background: #ecf5ff; }
        .goods-card {
            cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: relative;
        }
        .goods-card:hover { transform: translateY(-4px); box-shadow: 0 8px 18px rgba(0,0,0,0.12); }
        .goods-img { width: 100%; height: 220px; object-fit: cover; display: block; background: #f5f5f5; }
        .goods-info { padding: 14px; }
        .goods-title { margin: 0 0 10px; font-size: 18px; color: #333; line-height: 1.4; }
        .goods-price { margin: 0 0 8px; color: #f56c6c; font-size: 20px; font-weight: bold; }
        .goods-owner, .goods-category, .goods-status { margin: 0 0 6px; color: #666; font-size: 14px; }
        .favorite-btn {
            position: absolute; top: 12px; right: 12px; z-index: 5; width: 36px; height: 36px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.92); color: #999; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .favorite-btn.active { color: #f56c6c; }
        .empty-box {
            width: 100%; padding: 50px 20px; text-align: center; color: #666; font-size: 18px;
            background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .detail-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .detail-modal.show { display: flex; }
        .detail-card {
            width: 100%; max-width: 780px; max-height: 90vh; overflow-y: auto;
            background: #fff; border-radius: 14px; box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            padding: 24px; position: relative;
        }
        .detail-close {
            position: absolute; top: 14px; right: 14px; border: none; background: #f56c6c; color: #fff;
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-size: 18px;
        }
        .detail-image { width: 100%; height: 320px; object-fit: cover; border-radius: 10px; background: #f5f5f5; margin-bottom: 18px; }
        .detail-title { margin: 0 0 12px; font-size: 28px; color: #333; }
        .detail-price { margin: 0 0 12px; font-size: 24px; color: #f56c6c; font-weight: bold; }
        .detail-text { margin: 0 0 10px; color: #555; line-height: 1.7; font-size: 15px; word-break: break-word; }
    </style>
</head>
<body>
    <header>
        <div class="container nav-wrap">
            <a href="home.html" class="logo">Campus<span>Second-hand</span>Market</a>
            <ul class="nav-list">
                <li><a href="home.html">Home</a></li>
                <li><a href="all goods.html" style="color: #409eff; border-bottom: 2px solid #409eff;">All goods</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="publish.html" class="publish-btn">Sell Items</a></li>
                <li class="avatar-box">
                    <img src="./img/Default user avatar.png" alt="Default user avatar" class="avatar-img" id="navAvatar">
                </li>
            </ul>
        </div>
    </header>

    <div id="tipBox" class="tip-box"></div>

    <div class="page-container">
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Search items by keyword...">
                <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> Search</button>
            </div>
        </section>

        <div class="filter-bar">
            <section class="category-section">
                <h2 class="section-title">Classify</h2>
                <div class="category-wrap">
                    <div class="category-card active" data-category="all"><span>All</span></div>
                    <div class="category-card" data-category="book"><span>Books</span></div>
                    <div class="category-card" data-category="digital"><span>Digital</span></div>
                    <div class="category-card" data-category="life"><span>Life</span></div>
                    <div class="category-card" data-category="clothes"><span>Apparel</span></div>
                    <div class="category-card" data-category="sports"><span>Sports</span></div>
                    <div class="category-card" data-category="transport"><span>Transport</span></div>
                    <div class="category-card" data-category="other"><span>Other</span></div>
                </div>
            </section>

            <div class="filter-item">
                <label>Price：</label>
                <input type="number" id="minPrice" placeholder="lowest" style="width: 90px;">
                <span>-</span>
                <input type="number" id="maxPrice" placeholder="highest" style="width: 90px;">
                <button id="clearPrice" type="button">Clear</button>
            </div>

            <div class="filter-item">
                <label>Sort by：</label>
                <select id="sortSelect">
                    <option value="new">Latest Released</option>
                    <option value="price-up">Price: low to high</option>
                    <option value="price-down">Price: high to low</option>
                </select>
            </div>
        </div>

        <div class="goods-list" id="goodsContainer"></div>
    </div>

    <div id="detailModal" class="detail-modal">
        <div class="detail-card">
            <button id="detailCloseBtn" class="detail-close" type="button">×</button>
            <img id="detailImage" class="detail-image" src="" alt="item image">
            <h3 id="detailTitle" class="detail-title"></h3>
            <p id="detailPrice" class="detail-price"></p>
            <p id="detailItemId" class="detail-text"></p>
            <p id="detailCategory" class="detail-text"></p>
            <p id="detailStatus" class="detail-text"></p>
            <p id="detailOwner" class="detail-text"></p>
            <p id="detailDesc" class="detail-text"></p>
        </div>
    </div>


    <script>
        const API_BASE = 'http://localhost:3000';
        const goodsContainer = document.getElementById('goodsContainer');
        const searchInput = document.getElementById('searchInput');

        let allItems = [];
        let favouriteIds = [];
        let currentCategory = 'all';
        let searchKeyword = '';
        let tipTimer;

        function showTip(message, type = 'error') {
            const tipBox = document.getElementById('tipBox');

            clearTimeout(tipTimer);

            tipBox.textContent = message;
            tipBox.className = `tip-box ${type}`;

            tipTimer = setTimeout(() => {
                tipBox.className = 'tip-box';
                tipBox.textContent = '';
            }, 2000);
        }
        function requireLogin() {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                alert('Please login first to access the platform!');
                window.location.href = 'index.html';
                return null;
            }
            return currentUser;
        }

        function isFavorite(itemId) {
            return favouriteIds.includes(String(itemId));
        }

        async function toggleFavorite(itemId, el) {
            const user = localStorage.getItem('currentUser');
            if (!user) {
                alert('Please login first');
                return;
            }

            const stringId = String(itemId);
            const alreadyFav = favouriteIds.includes(stringId);

            try {
                const response = await fetch(`${API_BASE}/api/favourite/${alreadyFav ? 'remove' : 'add'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user,
                        item_id: itemId
                    })
                });

                const result = await response.json();
                if (!result.success) {
                    showTip(result.msg || 'Favourite operation failed');
                    return;
                }

                if (alreadyFav) {
                    favouriteIds = favouriteIds.filter(id => id !== stringId);
                    el.classList.remove('active');
                } else {
                    favouriteIds.push(stringId);
                    el.classList.add('active');
                }
            } catch (error) {
                console.error('Toggle favourite error:', error);
                showTip('Failed to connect to favourite table.');
            }
        }

        function getFirstImage(itemImages) {
            if (!itemImages) return 'https://picsum.photos/220/160';
            try {
                const parsed = typeof itemImages === 'string' ? JSON.parse(itemImages) : itemImages;
                if (Array.isArray(parsed) && parsed.length > 0 && parsed[0]) {
                    return parsed[0];
                }
            } catch (error) {
                console.error('Image parse error:', error);
            }
            return 'https://picsum.photos/220/160';
        }

        function sortItems(items, type) {
            const sorted = [...items];
            if (type === 'new') sorted.sort((a, b) => Number(b.item_id || 0) - Number(a.item_id || 0));
            else if (type === 'price-up') sorted.sort((a, b) => Number(a.item_price || 0) - Number(b.item_price || 0));
            else if (type === 'price-down') sorted.sort((a, b) => Number(b.item_price || 0) - Number(a.item_price || 0));
            return sorted;
        }

        function openDetail(item) {
            document.getElementById('detailImage').src = getFirstImage(item.item_images);
            document.getElementById('detailTitle').textContent = item.item_title || 'Untitled item';
            document.getElementById('detailPrice').textContent = item.item_price != null ? '$' + item.item_price : 'Price not set';
            document.getElementById('detailItemId').textContent = 'Item ID: ' + (item.item_id ?? 'Not set');
            document.getElementById('detailCategory').textContent = 'Category: ' + (item.item_category || 'Not set');
            document.getElementById('detailStatus').textContent = 'Status: ' + (item.item_status || 'unknown');
            document.getElementById('detailOwner').textContent = 'Publisher: ' + (item.user_name || item.user_id || 'Unknown');
            document.getElementById('detailDesc').textContent = 'Description: ' + (item.description || 'No description');
            document.getElementById('detailModal').classList.add('show');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('show');
        }

        function renderItems(items) {
            goodsContainer.innerHTML = '';

            if (items.length === 0) {
                goodsContainer.innerHTML = '<div class="empty-box">No items available</div>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'goods-card';

                const imageSrc = getFirstImage(item.item_images);
                const isFav = isFavorite(item.item_id);

                card.innerHTML = `
                    <i class="fa fa-heart favorite-btn ${isFav ? 'active' : ''}" data-id="${item.item_id}"></i>
                    <img src="${imageSrc}" class="goods-img" alt="${item.item_title || 'item'}">
                    <div class="goods-info">
                        <h3 class="goods-title">${item.item_title || 'Untitled item'}</h3>
                        <p class="goods-price">$${item.item_price ?? 0}</p>
                        <p class="goods-owner">Publisher: ${item.user_name || item.user_id || 'Unknown'}</p>
                        <p class="goods-category">Category: ${item.item_category || 'Not set'}</p>
                        <p class="goods-status">Status: ${item.item_status || 'unknown'}</p>
                    </div>
                `;

                card.querySelector('.favorite-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFavorite(e.target.dataset.id, e.target);
                });

                card.addEventListener('click', () => openDetail(item));
                goodsContainer.appendChild(card);
            });
        }

        function applyFilters() {
            let filtered = [...allItems];
            const sortType = document.getElementById('sortSelect').value;
            const minPriceValue = document.getElementById('minPrice').value;
            const maxPriceValue = document.getElementById('maxPrice').value;
            const minPrice = minPriceValue === '' ? 0 : Number(minPriceValue);
            const maxPrice = maxPriceValue === '' ? Infinity : Number(maxPriceValue);

            if (searchKeyword !== '') {
                filtered = filtered.filter(item =>
                    String(item.item_title || '').toLowerCase().includes(searchKeyword) ||
                    String(item.description || '').toLowerCase().includes(searchKeyword) ||
                    String(item.user_name || '').toLowerCase().includes(searchKeyword)
                );
            }

            if (currentCategory !== 'all') {
                filtered = filtered.filter(item => String(item.item_category || '').toLowerCase() === currentCategory);
            }

            filtered = filtered.filter(item => {
                const price = Number(item.item_price || 0);
                return price >= minPrice && price <= maxPrice;
            });

            renderItems(sortItems(filtered, sortType));
        }

        async function loadAllGoods() {
            const currentUser = requireLogin();
            if (!currentUser) return;

            try {
                const [itemsRes, favRes] = await Promise.all([
                    fetch(`${API_BASE}/api/item/list?page=1&size=1000`),
                    fetch(`${API_BASE}/api/favourite/ids/${currentUser}`)
                ]);

                const itemsResult = await itemsRes.json();
                const favResult = await favRes.json();

                if (!itemsResult.success || !Array.isArray(itemsResult.data)) {
                    showTip('Failed to load item information from database.');
                    renderItems([]);
                    return;
                }

                allItems = itemsResult.data;
                favouriteIds = Array.isArray(favResult.data) ? favResult.data.map(String) : [];

                document.getElementById('navAvatar').src = './img/Default user avatar.png';
                applyFilters();
                showTip('All goods loaded successfully.', 'success');
            } catch (error) {
                console.error('Load all goods error:', error);
                showTip('Failed to connect to database.');
                renderItems([]);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const navAvatar = document.getElementById('navAvatar');
            const detailModal = document.getElementById('detailModal');
            const detailCloseBtn = document.getElementById('detailCloseBtn');

            navAvatar.addEventListener('click', () => {
                window.location.href = 'user.html';
            });

            detailCloseBtn.addEventListener('click', closeDetail);
            detailModal.addEventListener('click', (e) => {
                if (e.target === detailModal) closeDetail();
            });

            document.querySelectorAll('.category-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.category-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    currentCategory = card.dataset.category;
                    applyFilters();
                });
            });

            document.getElementById('searchBtn').addEventListener('click', () => {
                searchKeyword = searchInput.value.trim().toLowerCase();
                applyFilters();
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    searchKeyword = searchInput.value.trim().toLowerCase();
                    applyFilters();
                }
            });

            document.getElementById('sortSelect').addEventListener('change', applyFilters);
            document.getElementById('minPrice').addEventListener('input', applyFilters);
            document.getElementById('maxPrice').addEventListener('input', applyFilters);

            document.getElementById('clearPrice').addEventListener('click', () => {
                document.getElementById('minPrice').value = '';
                document.getElementById('maxPrice').value = '';
                applyFilters();
            });

            loadAllGoods();
        });

        document.addEventListener('click', function (e) {
            const isLoggedIn = localStorage.getItem('currentUser');
            if (!isLoggedIn) {
                const target = e.target.closest('a, button, .open-chat');
                if (target) {
                    e.preventDefault();
                    alert('Please login first!');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                }
            }
        });
    </script>
    <footer>
        <div class="footer-text">
            <p>Campus Second-hand Market © 2025 This platform is only open to students of this school. </p>
        </div>
    </footer>
</body>
</html>
