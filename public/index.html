<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Second-hand Market - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #eef5ff 0%, #f7fbf2 100%);
      padding: 24px;
    }

    .login-container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.1);
      padding: 42px 36px;
    }

    .login-logo {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: #409eff;
      margin-bottom: 30px;
      line-height: 1.3;
    }

    .login-logo span {
      color: #67c23a;
    }

    .form-title {
      font-size: 22px;
      font-weight: 700;
      color: #303133;
      margin-bottom: 18px;
      text-align: center;
    }

    .input-box {
      width: 100%;
      padding: 15px 16px;
      margin-bottom: 10px;
      border: 1px solid #dcdfe6;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
      transition: all 0.2s ease;
    }

    select.input-box {
      appearance: none;
    }

    .input-box:focus {
      outline: none;
      border-color: #409eff;
      box-shadow: 0 0 0 3px rgba(64, 158, 255, 0.12);
    }

    .input-box.error {
      border-color: #f56c6c;
      background: #fff5f5;
    }

    .error-tip {
      display: none;
      color: #f56c6c;
      font-size: 13px;
      margin: -2px 0 12px;
      padding-left: 2px;
    }

    .global-tip {
      display: none;
      margin: 8px 0 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #fff2f0;
      border: 1px solid #ffccc7;
      color: #cf1322;
      font-size: 14px;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      background: #67c23a;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 6px;
    }

    .btn:hover {
      background: #5daf34;
      transform: translateY(-1px);
    }

    .switch-text {
      margin-top: 14px;
      text-align: right;
      color: #409eff;
      font-size: 15px;
      cursor: pointer;
    }

    .switch-text:hover {
      color: #1677ff;
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">Campus<span>Second-hand</span>Market</div>

    <div id="login-box">
      <div class="form-title">Login</div>
      <input id="login-id" class="input-box" placeholder="Enter ID" />
      <div class="error-tip" id="login-id-tip"></div>

      <input id="login-password" type="password" class="input-box" placeholder="Enter Password" />
      <div class="error-tip" id="login-password-tip"></div>

      <div class="global-tip" id="login-global-tip"></div>

      <button class="btn" onclick="login()">Login</button>
      <div class="switch-text" onclick="showSignup()">Don't have an account? Sign up</div>
    </div>

    <div id="signup-box" class="hidden">
      <div class="form-title">Sign up</div>
      <input id="signup-id" class="input-box" placeholder="ID (jd/jc + 6 digits)" />
      <div class="error-tip" id="signup-id-tip"></div>

      <input id="signup-password" type="password" class="input-box" placeholder="Please enter the password." />
      <div class="error-tip" id="signup-password-tip"></div>

      <input id="signup-name" class="input-box" placeholder="Please enter your name." />
      <div class="error-tip" id="signup-name-tip"></div>

      <select id="signup-gender" class="input-box">
        <option value="">Unknown</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
      <div class="error-tip" id="signup-gender-tip"></div>

      <input id="signup-birthday" type="date" class="input-box" />
      <div class="error-tip" id="signup-birthday-tip"></div>

      <input id="signup-phone" class="input-box" placeholder="Please enter your mobile number." />
      <div class="error-tip" id="signup-phone-tip"></div>

      <input id="signup-email" class="input-box" placeholder="Please enter your email." />
      <div class="error-tip" id="signup-email-tip"></div>

      <div class="global-tip" id="signup-global-tip"></div>

      <button class="btn" onclick="signup()">Submit</button>
      <div class="switch-text" onclick="showLogin()">Back to login</div>
    </div>
  </div>

  <script>
    function clearAllErrors(prefix) {
      document.querySelectorAll(`[id^="${prefix}-"][id$="-tip"]`).forEach(tip => {
        tip.style.display = 'none';
        tip.textContent = '';
      });

      const globalTip = document.getElementById(`${prefix}-global-tip`);
      if (globalTip) {
        globalTip.style.display = 'none';
        globalTip.textContent = '';
      }

      document.querySelectorAll(`#${prefix}-box .input-box`).forEach(input => {
        input.classList.remove('error');
      });
    }

    function showFieldError(tipId, msg) {
      const tip = document.getElementById(tipId);
      const input = document.getElementById(tipId.replace('-tip', ''));
      if (tip) {
        tip.textContent = msg;
        tip.style.display = 'block';
      }
      if (input) {
        input.classList.add('error');
      }
    }

    function showGlobalError(id, msg) {
      const tip = document.getElementById(id);
      if (!tip) return;
      tip.textContent = msg;
      tip.style.display = 'block';
    }

    function validateID(id) {
      return /^(jd|jc)\d{6}$/i.test(id);
    }

    function showSignup() {
      clearAllErrors('login');
      document.getElementById('login-box').classList.add('hidden');
      document.getElementById('signup-box').classList.remove('hidden');
    }

    function showLogin() {
      clearAllErrors('signup');
      document.getElementById('signup-box').classList.add('hidden');
      document.getElementById('login-box').classList.remove('hidden');
    }

    async function login() {
      clearAllErrors('login');
      const userId = document.getElementById('login-id').value.trim();
      const userPassword = document.getElementById('login-password').value.trim();

      let isValid = true;

      if (!userId) {
        showFieldError('login-id-tip', 'ID cannot be empty');
        isValid = false;
      } else if (!validateID(userId)) {
        showFieldError('login-id-tip', 'The ID format is incorrect. jd/jc + 6 digits.');
        isValid = false;
      }

      if (!userPassword) {
        showFieldError('login-password-tip', 'Password cannot be empty');
        isValid = false;
      }

      if (!isValid) return;

      try {
        const response = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: userId,
            user_password: userPassword
          })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('currentUser', userId);
          alert('Login successful');
          window.location.href = 'home.html';
          return;
        }

        if (data.msg === 'User not found') {
          showGlobalError('login-global-tip', 'The user does not exist');
        } else if (data.msg === 'Wrong password') {
          showGlobalError('login-global-tip', 'Password incorrect');
        } else {
          showGlobalError('login-global-tip', 'Login failed. Please try again.');
        }
      } catch (error) {
        console.error('Login error:', error);
        showGlobalError('login-global-tip', 'Network anomaly detected. Please check the server.');
      }
    }

    async function signup() {
      clearAllErrors('signup');
      const userId = document.getElementById('signup-id').value.trim().toLowerCase();
      const userPassword = document.getElementById('signup-password').value.trim();
      const userName = document.getElementById('signup-name').value.trim();
      const gender = document.getElementById('signup-gender').value;
      const birthday = document.getElementById('signup-birthday').value;
      const phone = document.getElementById('signup-phone').value.trim();
      const email = document.getElementById('signup-email').value.trim();

      let isValid = true;

      if (!userId) {
        showFieldError('signup-id-tip', 'ID cannot be empty');
        isValid = false;
      } else if (!validateID(userId)) {
        showFieldError('signup-id-tip', 'The ID format is incorrect. jd/jc + 6 digits.');
        isValid = false;
      }
      if (!userPassword) {
        showFieldError('signup-password-tip', 'Password cannot be empty');
        isValid = false;
      }
      if (!userName) {
        showFieldError('signup-name-tip', 'Name cannot be left blank.');
        isValid = false;
      }
      if (!gender) {
        showFieldError('signup-gender-tip', 'Please select your gender.');
        isValid = false;
      }
      if (!birthday) {
        showFieldError('signup-birthday-tip', 'Please select your birthday.');
        isValid = false;
      }
      if (!phone) {
        showFieldError('signup-phone-tip', 'Mobile phone number cannot be empty');
        isValid = false;
      }
      if (!email) {
        showFieldError('signup-email-tip', 'The email field cannot be left blank.');
        isValid = false;
      }

      if (!isValid) return;

      try {
        const response = await fetch('http://localhost:3000/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: userId,
            user_password: userPassword,
            user_name: userName,
            gender,
            date_of_birth: birthday,
            mobile_number: phone,
            email
          })
        });

        const data = await response.json();

        if (data.success) {
          alert('Registration successful. Please log in.');
          showLogin();
        } else {
          showGlobalError('signup-global-tip', data.msg || 'Registration failed');
        }
      } catch (error) {
        console.error('Signup error:', error);
        showGlobalError('signup-global-tip', 'Network anomaly detected. Please check the server.');
      }
    }

    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      const loginVisible = !document.getElementById('login-box').classList.contains('hidden');
      if (loginVisible) {
        login();
      } else {
        signup();
      }
    });
  </script>
</body>
</html>
