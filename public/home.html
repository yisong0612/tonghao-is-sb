<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Second-hand Community - Your campus idle goods trading platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tip-box {
            display: none;
            margin: 100px auto 0;
            max-width: 1200px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
        }
        .tip-box.error {
            display: block;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #cf1322;
        }
        .tip-box.success {
            display: block;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #389e0d;
        }
        .empty-box {
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            color: #666;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .goods-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .goods-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            background: #f5f5f5;
        }
        .goods-info {
            padding: 14px;
        }
        .goods-title {
            margin: 0 0 10px;
            font-size: 18px;
            color: #333;
        }
        .goods-price {
            margin: 0 0 8px;
            font-size: 18px;
            color: #f56c6c;
            font-weight: bold;
        }
        .goods-owner, .goods-desc, .goods-status {
            margin: 0 0 6px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .goods-card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .goods-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.12);
        }
        .detail-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .detail-modal.show {
            display: flex;
        }
        .detail-card {
            width: 100%;
            max-width: 760px;
            max-height: 90vh;
            overflow-y: auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.18);
            padding: 24px;
            position: relative;
        }
        .detail-close {
            position: absolute;
            top: 14px;
            right: 14px;
            border: none;
            background: #f56c6c;
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .detail-close:hover {
            background: #e45656;
        }
        .detail-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 10px;
            background: #f5f5f5;
            margin-bottom: 18px;
        }
        .detail-title {
            margin: 0 0 12px;
            font-size: 28px;
            color: #333;
        }
        .detail-price {
            margin: 0 0 12px;
            font-size: 24px;
            color: #f56c6c;
            font-weight: bold;
        }
        .detail-text {
            margin: 0 0 10px;
            color: #555;
            line-height: 1.7;
            font-size: 15px;
            word-break: break-word;
        }

    </style>
</head>
<body>
    <header>
        <div class="container nav-wrap">
            <a href="index.html" class="logo">Campus<span>Second-hand</span>Market</a>
            <ul class="nav-list">
                <li><a href="index.html" style="color: #409eff; border-bottom: 2px solid #409eff;">Home</a></li>
                <li><a href="all goods.html">All goods</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="publish.html" class="publish-btn">Sell Items</a></li>
                <li class="avatar-box">
                    <img src="./img/Default user avatar.png" alt="Default user avatar" class="avatar-img" id="navAvatar">
                </li>
            </ul>
        </div>
    </header>

    <div id="tipBox" class="tip-box"></div>

    <div class="user-menu">
        <a href="cart.html">
            <img src="img/cart.png" alt="icon">
            <span>Cart</span>
        </a>
        <a href="pending_payment.html">
            <img src="img/pending_payment.png" alt="icon">
            <span>Pending Payment</span>
        </a>
        <a href="favorites.html">
            <img src="img/favorites.png" alt="icon">
            <span>Favorites</span>
        </a>
        <a href="purchase_history.html">
            <img src="img/purchase_history.png" alt="icon">
            <span>Purchase History</span>
        </a>
        <a href="refund_and_after_sales.html">
            <img src="img/refund_and_after_sales.png" alt="icon">
            <span>Refund/After Sales</span>
        </a>
    </div>

    <div class="container">
        <div class="my-orders-section" style="margin-top: 90px;"></div>
        <h2 class="section-title">My Publish</h2>
        <div class="goods-wrap" id="goodsContainer"></div>
    </div>


    <div id="detailModal" class="detail-modal">
        <div class="detail-card">
            <button id="detailCloseBtn" class="detail-close" type="button">×</button>
            <img id="detailImage" class="detail-image" src="" alt="item image">
            <h3 id="detailTitle" class="detail-title"></h3>
            <p id="detailPrice" class="detail-price"></p>
            <p id="detailItemId" class="detail-text"></p>
            <p id="detailCategory" class="detail-text"></p>
            <p id="detailStatus" class="detail-text"></p>
            <p id="detailOwner" class="detail-text"></p>
            <p id="detailDesc" class="detail-text"></p>
        </div>
    </div>

    <footer>
        <div class="footer-text">
            <p>Campus Second-hand Market © 2025 This platform is only open to students of this school. </p>
        </div>
    </footer>

<script>
const API_BASE = 'http://localhost:3000';

function showTip(message, type = 'error') {
    const tipBox = document.getElementById('tipBox');
    tipBox.textContent = message;
    tipBox.className = `tip-box ${type}`;
}

function requireLogin() {
    const currentUser = localStorage.getItem('currentUser');
    if (!currentUser) {
        alert('Please login first!');
        window.location.href = 'index.html';
        return null;
    }
    return currentUser;
}

function getFirstImage(itemImages) {
    if (!itemImages) return './img/Default user avatar.png';
    try {
        const parsed = typeof itemImages === 'string' ? JSON.parse(itemImages) : itemImages;
        if (Array.isArray(parsed) && parsed.length > 0 && parsed[0]) {
            return parsed[0];
        }
    } catch (error) {
        console.error('Image parse error:', error);
    }
    return 'https://picsum.photos/240/180';
}

function renderEmpty(message) {
    document.getElementById('goodsContainer').innerHTML = `<div class="empty-box">${message}</div>`;
}

function openDetail(item, userName) {
    const imageSrc = getFirstImage(item.item_images);
    document.getElementById('detailImage').src = imageSrc;
    document.getElementById('detailTitle').textContent = item.item_title || 'Untitled item';
    document.getElementById('detailPrice').textContent = item.item_price != null ? `$${item.item_price}` : 'Price not set';
    document.getElementById('detailItemId').textContent = `Item ID: ${item.item_id ?? 'Not set'}`;
    document.getElementById('detailCategory').textContent = `Category: ${item.item_category || 'Not set'}`;
    document.getElementById('detailStatus').textContent = `Status: ${item.item_status || 'unknown'}`;
    document.getElementById('detailOwner').textContent = `Publisher: ${userName}`;
    document.getElementById('detailDesc').textContent = `Description: ${item.description || 'No description'}`;
    document.getElementById('detailModal').classList.add('show');
}

function closeDetail() {
    document.getElementById('detailModal').classList.remove('show');
}

function renderItems(items, userName) {
    const container = document.getElementById('goodsContainer');
    container.innerHTML = '';

    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'goods-card';

        const imageSrc = getFirstImage(item.item_images);
        const safeTitle = item.item_title || 'Untitled item';
        const safePrice = item.item_price != null ? `$${item.item_price}` : 'Price not set';
        const safeStatus = item.item_status || 'unknown';
        const safeDesc = item.description || 'No description';

        card.innerHTML = `
            <img src="${imageSrc}" alt="${safeTitle}" class="goods-img">
            <div class="goods-info">
                <h3 class="goods-title">${safeTitle}</h3>
                <p class="goods-price">${safePrice}</p>
                <p class="goods-owner">Publisher: ${userName}</p>
                <p class="goods-status">Status: ${safeStatus}</p>
                <p class="goods-desc">${safeDesc}</p>
            </div>
        `;

        card.addEventListener('click', () => openDetail(item, userName));
        container.appendChild(card);
    });
}

async function loadHomeData() {
    const currentUserId = requireLogin();
    if (!currentUserId) return;

    const navAvatar = document.getElementById('navAvatar');
    const goodsContainer = document.getElementById('goodsContainer');

    try {
        const [usersRes, itemsRes] = await Promise.all([
            fetch(`${API_BASE}/api/users`),
            fetch(`${API_BASE}/api/item/list?page=1&size=100`)
        ]);

        const usersResult = await usersRes.json();
        const itemsResult = await itemsRes.json();

        if (!usersResult.success || !Array.isArray(usersResult.data)) {
            showTip('Failed to load user information from database.');
            renderEmpty('Unable to load user information.');
            return;
        }

        if (!itemsResult.success || !Array.isArray(itemsResult.data)) {
            showTip('Failed to load item information from database.');
            renderEmpty('Unable to load published items.');
            return;
        }

        const currentUser = usersResult.data.find(user =>
            String(user.user_id).toLowerCase() === String(currentUserId).toLowerCase()
        );

        if (!currentUser) {
            showTip('Current user was not found in database.');
            renderEmpty('User not found.');
            return;
        }

        navAvatar.src = './img/Default user avatar.png';

        const myItems = itemsResult.data.filter(item =>
            String(item.user_id).toLowerCase() === String(currentUserId).toLowerCase()
        );

        if (myItems.length === 0) {
            showTip('No published items found for current user.', 'success');
            renderEmpty('No published items');
            return;
        }

        renderItems(myItems, currentUser.user_name || currentUser.user_id);
        showTip('My Publish loaded successfully.', 'success');
    } catch (error) {
        console.error('Load home data error:', error);
        showTip('Network error. Please check whether server.js and MySQL are running.');
        renderEmpty('Failed to connect to database.');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const navAvatar = document.getElementById('navAvatar');
    const detailModal = document.getElementById('detailModal');
    const detailCloseBtn = document.getElementById('detailCloseBtn');

    navAvatar.addEventListener('click', () => {
        window.location.href = 'user.html';
    });

    detailCloseBtn.addEventListener('click', closeDetail);
    detailModal.addEventListener('click', (e) => {
        if (e.target === detailModal) closeDetail();
    });

    loadHomeData();
});

document.addEventListener('click', function (e) {
    const isLoggedIn = localStorage.getItem('currentUser');

    if (!isLoggedIn) {
        const target = e.target.closest('a, button, .open-chat');
        if (target) {
            e.preventDefault();
            alert('Please login first!');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }
    }
});
</script>
</body>
</html>
